<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rimsha ❤️ App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ff6a88;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    .app-container {
      max-width: 400px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to top, #ff758c, #ff7eb3);
    }

    .header {
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      text-align: center;
      padding: 20px;
    }

    .profile img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid white;
    }

    .heart {
      font-size: 40px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% {transform: scale(1);}
      50% {transform: scale(1.3);}
      100% {transform: scale(1);}
    }

    .nav-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.2);
      padding: 10px;
    }

    .nav-bar button {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }
  </style>
</head>

<body>

<div class="app-container">

  <div class="header">❤️ Rimsha App ❤️</div>

  <div class="content">

    <!-- HOME -->
    <div id="home" class="page active">
      <div class="profile">
        <img src="images/rimsha.jpg.jpeg">
      </div>
      <h3 class="mt-3">I Love You Rimsha 💖</h3>
      <div class="heart">💋</div>
      <p class="mt-2">Tum meri duniya ho 🌍</p>
    </div>

    <!-- LETTER -->
    <div id="letter" class="page">
      <h4>💌 Love Letter</h4>
      <p>
        Meri pyari Rimsha ❤️ <br><br>
        Tum meri life ka sab se beautiful hissa ho 💕  
        Main tumse bohat pyar karta hoon 💋  
        Tum meri khushi ho ✨  
      </p>
    </div>

    <!-- KISSES -->
    <div id="kiss" class="page">
      <h4>💋 Unlimited Kisses</h4>
      <button class="btn btn-light mt-3" onclick="sendKiss()">Send Kiss</button>
      <div id="kissArea"></div>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="nav-bar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('letter')">Letter</button>
    <button onclick="showPage('kiss')">Kisses</button>
  </div>

</div>

<script>
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function sendKiss() {
    let kiss = document.createElement("div");
    kiss.innerHTML = "💋";
    kiss.style.fontSize = "30px";
    document.getElementById("kissArea").appendChild(kiss);
  }
</script>

</body>
</html>
